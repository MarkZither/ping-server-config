version: "3.8"

services:
  pingfederate:
    image: pingidentity/pingfederate:edge
    environment:
      - SERVER_PROFILE_URL=https://github.com/MarkZither/ping-server-config.git
      - SERVER_PROFILE_PATH=server-profile
      - PING_IDENTITY_ACCEPT_EULA=YES
    ports:
      - "9999:9999"
      - "9031:9031"
    volumes:
      - ./server-profile:/opt/in
